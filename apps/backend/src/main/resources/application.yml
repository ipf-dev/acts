spring:
  application:
    name: acts-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/acts}
    username: ${SPRING_DATASOURCE_USERNAME:acts}
    password: ${SPRING_DATASOURCE_PASSWORD:acts}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5GB
      max-request-size: 5GB

server:
  port: ${SERVER_PORT:8088}
  tomcat:
    max-http-form-post-size: 5GB
    max-swallow-size: 5GB

# Provide Google OAuth registration through environment variables when ready:
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID=...
# SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET=...
acts:
  auth:
    allowed-domain: iportfolio.co.kr
    backend-base-url: ${BACKEND_BASE_URL:http://localhost:8088}
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    admin-emails:
      - minsungkim@iportfolio.co.kr
  storage:
    bucket: ${ACTS_STORAGE_BUCKET:acts-assets}
    endpoint: ${ACTS_STORAGE_ENDPOINT:http://localhost:4566}
    region: ${ACTS_STORAGE_REGION:ap-northeast-2}
    access-key: ${ACTS_STORAGE_ACCESS_KEY:test}
    secret-key: ${ACTS_STORAGE_SECRET_KEY:test}
    path-style-access-enabled: ${ACTS_STORAGE_PATH_STYLE_ACCESS_ENABLED:true}
    auto-create-bucket: ${ACTS_STORAGE_AUTO_CREATE_BUCKET:true}
