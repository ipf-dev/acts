name: Deploy

on:
  push:
    branches: [stage, prod]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Backend test
        working-directory: apps/backend
        run: ./gradlew test --no-daemon

      - name: Frontend build check
        working-directory: apps/frontend
        run: |
          npm ci
          npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "prod" ]; then
            echo "eb_env=${{ vars.EB_PROD_ENVIRONMENT }}" >> "$GITHUB_OUTPUT"
            echo "role_arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "eb_env=${{ vars.EB_STAGE_ENVIRONMENT }}" >> "$GITHUB_OUTPUT"
            echo "role_arn=${{ secrets.AWS_ROLE_ARN_STAGE }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.role_arn }}
          aws-region: ap-northeast-2

      - name: Generate source bundle
        run: |
          zip -r source-bundle.zip . \
            -x '.git/*' \
            -x 'node_modules/*' \
            -x '.agents/*' \
            -x '.claude/*'

      - name: Deploy to Elastic Beanstalk
        run: |
          VERSION_LABEL="acts-${{ github.ref_name }}-${{ github.sha }}"
          APP_NAME="${{ vars.EB_APPLICATION_NAME }}"
          S3_BUCKET="${{ vars.EB_S3_BUCKET }}"

          aws s3 cp source-bundle.zip "s3://${S3_BUCKET}/${VERSION_LABEL}.zip"

          EXISTING_VERSION=$(
            aws elasticbeanstalk describe-application-versions \
              --application-name "${APP_NAME}" \
              --version-labels "${VERSION_LABEL}" \
              --query 'ApplicationVersions[0].VersionLabel' \
              --output text
          )

          if [ "${EXISTING_VERSION}" = "${VERSION_LABEL}" ]; then
            echo "Application version ${VERSION_LABEL} already exists. Reusing it."
          else
            aws elasticbeanstalk create-application-version \
              --application-name "${APP_NAME}" \
              --version-label "${VERSION_LABEL}" \
              --source-bundle S3Bucket="${S3_BUCKET}",S3Key="${VERSION_LABEL}.zip"
          fi

          aws elasticbeanstalk update-environment \
            --environment-name "${{ steps.env.outputs.eb_env }}" \
            --version-label "${VERSION_LABEL}"

          echo "Deployed ${VERSION_LABEL} to ${{ steps.env.outputs.eb_env }}"
